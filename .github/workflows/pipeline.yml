name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  Test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  #charge le repo

      - name: Setup Node.js
        uses: actions/setup-node@v4  
        with:
          node-version: 20.x     #installe NodeJs >= v20

      - name: Cypress E2E Install
        uses: cypress-io/github-action@v6
        with:
          runTests: false   #installe cypress mais en bloquant les tests car manque les dépendances

      - name: Install dependencies    #installation serveur spécifié dans package.json
        run: |
          npm i
          npm install serve --save-dev  

      - name: Start E2E Test
        uses: cypress-io/github-action@v6
        with: 
          install: false
          start: npm run dev     #démarrage des tests

      - name: Create nyc_output directory
        run: mkdir -p .nyc_output

      - name: Generate Coverage Report
        run: npm run cypress:cov

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 3    #garde les screenshots sur 3 jours

      - name: Setup pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  Deploy:
    runs-on: ubuntu-latest
    needs: Test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   #obliger de checkout car repart d'un environnement vide

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5  #importe .ftp-deploy-sync-state.json qui ne revoie que les fichiers modifiés à chaque déploiement
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /www/      
        
